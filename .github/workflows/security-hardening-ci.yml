name: Security Hardening CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  python-security-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aether-os
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  tours-app-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/Web-Developer/TOURS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: projects/Web-Developer/TOURS/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  self-improve-patch-proposal:
    runs-on: ubuntu-latest
    needs: [python-security-checks, tours-app-checks]
    defaults:
      run:
        working-directory: aether-os
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate quality-gated patch proposal artifact
        run: python -m evals.quality_gate_patch_proposal

      - name: Upload patch proposal artifact
        uses: actions/upload-artifact@v4
        with:
          name: self-improve-patch-proposal
          path: aether-os/memory/proposed_patches/latest.json
