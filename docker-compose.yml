# в”Ђв”Ђ AetheerAI docker-compose.yml в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Usage:
#   docker compose up --build            # start all services
#   docker compose up -d                 # detached mode
#   docker compose logs -f aetheerai     # follow logs
#   docker compose down                  # stop and remove containers

version: "3.9"

services:

  # в”Ђв”Ђ AetheerAI API в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  aetheerai:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: aetheerai:latest
    container_name: aetheerai-api
    restart: unless-stopped
    ports:
      - "${AETHER_PORT:-8000}:8000"
    env_file:
      - AetheerAI/.env
    environment:
      # Override these or set them in AetheerAI/.env
      - AETHER_HOST=0.0.0.0
      - AETHER_PORT=8000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_JSON=${LOG_JSON:-1}
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/memory/aetheer.db}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}
    volumes:
      # Persist database, uploads, and logs between container restarts
      - aetheer_memory:/app/memory
      - aetheer_uploads:/app/data/uploads
      - aetheer_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # в”Ђв”Ђ AetheerAI Queue Worker Supervisor в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  aetheerai-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: aetheerai:latest
    container_name: aetheerai-worker
    restart: unless-stopped
    command: ["python", "start_worker.py"]
    env_file:
      - AetheerAI/.env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_JSON=${LOG_JSON:-1}
      - AETHEER_WORKER_AUTOSCALE=${AETHEER_WORKER_AUTOSCALE:-1}
      - AETHEER_WORKER_MIN_PROCESSES=${AETHEER_WORKER_MIN_PROCESSES:-1}
      - AETHEER_WORKER_MAX_PROCESSES=${AETHEER_WORKER_MAX_PROCESSES:-4}
      - AETHEER_WORKER_TARGET_QUEUE_DEPTH_PER_WORKER=${AETHEER_WORKER_TARGET_QUEUE_DEPTH_PER_WORKER:-4}
      - AETHEER_WORKER_MAX_CONCURRENCY=${AETHEER_WORKER_MAX_CONCURRENCY:-1}
    volumes:
      - aetheer_memory:/app/memory
      - aetheer_logs:/app/logs
    depends_on:
      aetheerai:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: aetheerai-prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=14d"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./ops/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./ops/observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      aetheerai:
        condition: service_healthy

  loki:
    image: grafana/loki:3.2.1
    container_name: aetheerai-loki
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - "-config.file=/etc/loki/config.yaml"
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./ops/observability/loki-config.yml:/etc/loki/config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: aetheerai-promtail
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - "-config.file=/etc/promtail/config.yml"
    volumes:
      - ./ops/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - aetheer_logs:/var/log/aetheerai:ro
    depends_on:
      loki:
        condition: service_started

  grafana:
    image: grafana/grafana:11.2.0
    container_name: aetheerai-grafana
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_ENABLED:-false}
    volumes:
      - ./ops/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started

  # в”Ђв”Ђ Optional: Nginx reverse proxy в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  # Uncomment to expose AetheerAI behind Nginx with TLS termination.
  # nginx:
  #   image: nginx:1.25-alpine
  #   container_name: aetheerai-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./certs:/etc/nginx/certs:ro
  #   depends_on:
  #     - aetheerai

volumes:
  aetheer_memory:
  aetheer_uploads:
  aetheer_logs:
  prometheus_data:
  loki_data:
  grafana_data:
